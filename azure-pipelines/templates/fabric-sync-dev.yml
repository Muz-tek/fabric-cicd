parameters:
  serviceConnection: ''

jobs:
  - job: sync_dev_workspace
    displayName: Sync Dev workspace from main
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        displayName: Use Python
        inputs:
          versionSpec: '3.11'

      - task: AzureCLI@2
        displayName: Update Git-connected Dev workspace
        inputs:
          azureSubscription: ${{ parameters.serviceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            python -m pip install --upgrade pip
            pip install requests
            python scripts/sync_fabric_from_git.py --environment dev

      - publish: $(System.DefaultWorkingDirectory)/release-evidence
        displayName: Publish Dev sync evidence
        artifact: release-evidence-dev-sync
        condition: always()
