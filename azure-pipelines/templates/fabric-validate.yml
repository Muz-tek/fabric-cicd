jobs:
  - job: fabric_validate
    displayName: Validate Fabric artifacts
    steps:
      - checkout: self
        path: iac
      - checkout: fabric_source
        path: fabric-source

      - task: UsePythonVersion@0
        displayName: Use Python
        inputs:
          versionSpec: '3.11'

      - script: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pytest nbformat jsonschema yamllint
          yamllint "$(Pipeline.Workspace)/iac/azure-pipelines"
          pytest "$(Pipeline.Workspace)/iac/tests"
          FABRIC_SOURCE_ROOT="$(Pipeline.Workspace)/fabric-source" python "$(Pipeline.Workspace)/iac/scripts/validate_fabric_items.py"
        displayName: Run static checks and tests
