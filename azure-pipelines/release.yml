trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/*
      - azure-pipelines/*
      - scripts/*

resources:
  repositories:
    - repository: fabric_source
      type: git
      name: fabric-workloads
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-fabric-dataops
  - name: terraformVersion
    value: 1.8.5

stages:
  - stage: Plan_Platform
    displayName: Plan Fabric platform
    jobs:
      - template: templates/terraform-plan.yml
        parameters:
          planName: platform
          serviceConnection: $(azureServiceConnection)

  - stage: Apply_Platform
    displayName: Apply Fabric platform
    dependsOn: Plan_Platform
    condition: succeeded()
    jobs:
      - deployment: apply_platform
        displayName: Terraform apply workspaces and deployment pipeline
        environment: fabric-platform
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-apply.yml
                  parameters:
                    planName: platform
                    serviceConnection: $(azureServiceConnection)

  - stage: Sync_Dev
    displayName: Sync Dev workspace from Git
    dependsOn: Apply_Platform
    condition: succeeded()
    jobs:
      - template: templates/fabric-sync-dev.yml
        parameters:
          serviceConnection: $(azureServiceConnection)

  - stage: Deploy_Test
    displayName: Deploy Dev to Test
    dependsOn: Sync_Dev
    condition: succeeded()
    jobs:
      - deployment: deploy_test
        displayName: Fabric deployment pipeline Dev to Test
        environment: fabric-test
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/fabric-promote.yml
                  parameters:
                    sourceStage: dev
                    targetStage: test
                    serviceConnection: $(azureServiceConnection)

  - stage: Deploy_Prod
    displayName: Deploy Test to Prod
    dependsOn: Deploy_Test
    condition: succeeded()
    jobs:
      - deployment: deploy_prod
        displayName: Fabric deployment pipeline Test to Prod
        environment: fabric-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/fabric-promote.yml
                  parameters:
                    sourceStage: test
                    targetStage: prod
                    serviceConnection: $(azureServiceConnection)
