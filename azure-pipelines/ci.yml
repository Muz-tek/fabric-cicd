trigger:
  branches:
    include:
      - main
      - feature/*
      - bugfix/*
  paths:
    include:
      - tests/*
      - terraform/*
      - azure-pipelines/*
      - scripts/*

resources:
  repositories:
    - repository: fabric_source
      type: git
      name: fabric-workloads
      trigger:
        branches:
          include:
            - main
            - develop
            - feature/*
            - bugfix/*

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-fabric-dataops
  - name: terraformVersion
    value: 1.8.5

stages:
  - stage: Validate
    displayName: Validate code and IaC
    jobs:
      - template: templates/fabric-validate.yml
      - template: templates/terraform-plan.yml
        parameters:
          planName: platform
          serviceConnection: $(azureServiceConnection)
