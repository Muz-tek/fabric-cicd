parameters:
  sourceStage: ''
  targetStage: ''
  policy: ''
  serviceConnection: ''

steps:
  - checkout: self

  - task: UsePythonVersion@0
    displayName: Use Python
    inputs:
      versionSpec: '3.11'

  - task: AzureCLI@2
    displayName: Deploy Fabric ${{ parameters.sourceStage }} to ${{ parameters.targetStage }}
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install requests
        python scripts/deploy_fabric_stage.py \
          --source "${{ parameters.sourceStage }}" \
          --target "${{ parameters.targetStage }}" \
          --policy "${{ parameters.policy }}"

  - publish: $(System.DefaultWorkingDirectory)/release-evidence
    displayName: Publish release evidence
    artifact: release-evidence-${{ parameters.sourceStage }}-to-${{ parameters.targetStage }}
    condition: always()
