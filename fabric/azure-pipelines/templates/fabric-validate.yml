jobs:
  - job: fabric_validate
    displayName: Validate Fabric artifacts
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        displayName: Use Python
        inputs:
          versionSpec: '3.11'

      - script: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pytest nbformat jsonschema yamllint
          yamllint azure-pipelines
          if find tests -name 'test_*.py' | grep -q .; then
            pytest tests
          fi
          FABRIC_SOURCE_ROOT="$(System.DefaultWorkingDirectory)" python scripts/validate_fabric_items.py
        displayName: Run static checks and tests
