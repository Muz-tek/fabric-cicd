trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
      - bugfix/*
  paths:
    include:
      - azure-pipelines/**
      - scripts/**
      - tests/**
      - notebooks/**
      - pipelines/**
      - items/**
      - semantic-models/**
      - reports/**
      - deployment-rules/**

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-fabric-dataops

stages:
  - stage: Validate
    displayName: Validate Fabric workload
    jobs:
      - template: templates/fabric-validate.yml

  - stage: Sync_Dev
    displayName: Sync Dev workspace from Git
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - template: templates/fabric-sync-dev.yml
        parameters:
          serviceConnection: $(azureServiceConnection)

  - stage: Deploy_Test
    displayName: Deploy Dev to Test
    dependsOn: Sync_Dev
    condition: succeeded()
    jobs:
      - deployment: deploy_test
        displayName: Fabric deployment pipeline Dev to Test
        environment: fabric-test
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/fabric-promote.yml
                  parameters:
                    sourceStage: dev
                    targetStage: test
                    serviceConnection: $(azureServiceConnection)

  - stage: Deploy_Prod
    displayName: Deploy Test to Prod
    dependsOn: Deploy_Test
    condition: succeeded()
    jobs:
      - deployment: deploy_prod
        displayName: Fabric deployment pipeline Test to Prod
        environment: fabric-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/fabric-promote.yml
                  parameters:
                    sourceStage: test
                    targetStage: prod
                    serviceConnection: $(azureServiceConnection)
