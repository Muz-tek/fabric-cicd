parameters:
  planName: ''
  serviceConnection: ''

steps:
  - checkout: self

  - task: TerraformInstaller@1
    displayName: Install Terraform
    inputs:
      terraformVersion: $(terraformVersion)

  - download: current
    artifact: tfplan-${{ parameters.planName }}

  - task: AzureCLI@2
    displayName: Terraform apply ${{ parameters.planName }}
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: terraform
      inlineScript: |
        set -euo pipefail
        terraform init
        terraform apply -auto-approve "$(Pipeline.Workspace)/tfplan-${{ parameters.planName }}/tfplan-${{ parameters.planName }}"
    env:
      AZDO_PERSONAL_ACCESS_TOKEN: $(System.AccessToken)
